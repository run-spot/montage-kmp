name: Publish Artifacts

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install GPG
        run: |
          brew install gpg

      - name: Import GPG Key
        env:
          SIGNING_KEY: ${{ secrets.GPG_KEY_CONTENTS }}
        run: |
          echo "$SIGNING_KEY" | gpg --dearmor > "${HOME}/secring.gpg"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Add Gradle Properties
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          echo "mavenCentralUsername=${MAVEN_CENTRAL_USERNAME}" >> gradle.properties
          echo "mavenCentralPassword=${MAVEN_CENTRAL_PASSWORD}" >> gradle.properties
          echo "signing.keyId=${SIGNING_KEY_ID}" >> gradle.properties
          echo "signing.password=${SIGNING_KEY_PASSWORD}" >> gradle.properties
          echo "signing.secretKeyRingFile=${HOME}/secring.gpg" >> gradle.properties

      - name: Verify tag matches publish.properties version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PUBLISH_VERSION="$(grep '^version=' library/publish.properties | cut -d '=' -f2 | tr -d '[:space:]')"
          if [ "${VERSION}" != "${PUBLISH_VERSION}" ]; then
            echo "Tag version (${VERSION}) does not match library/publish.properties (${PUBLISH_VERSION})"
            exit 1
          fi

      - name: Publish to Maven Central
        run: |
          VERSION="${GITHUB_REF_NAME}"
          ./gradlew publishAndReleaseToMavenCentral -Pversion="${VERSION}" --no-configuration-cache
