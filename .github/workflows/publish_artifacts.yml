name: Publish Artifacts

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish:
    name: Publish
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify tag matches publish.properties version
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PUBLISH_VERSION="$(grep '^version=' library/publish.properties | cut -d '=' -f2 | tr -d '[:space:]')"
          if [ "${VERSION}" != "${PUBLISH_VERSION}" ]; then
            echo "Tag version (${VERSION}) does not match library/publish.properties (${PUBLISH_VERSION})"
            exit 1
          fi

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
        run: |
          ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache
